spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  access-expiry: 900000
  refresh-expiry: 604800000

app:
  cors-allowed-origins: http://localhost:3000

ocr:
  api-key: ${OCR_API_KEY:}

server:
  port: 8081
